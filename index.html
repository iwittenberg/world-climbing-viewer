<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Climbing Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .topbar {
      max-width: 1600px;
      margin: 0 auto;
      padding: 16px 24px 12px;
      display: flex;
      align-items: baseline;
      gap: 24px;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 1.2rem;
      color: #fff;
    }
    .event-picker label {
      font-size: 0.9rem;
      color: #aaa;
      margin-right: 8px;
    }
    .event-picker select {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #1a4a7a;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.9rem;
      font-family: inherit;
    }
    .player-container {
      background: #000;
      padding: 0 24px;
    }
    .player-inner {
      max-width: 1600px;
      width: min(100%, calc((100vh - 140px) * 16 / 9));
      margin: 0 auto;
    }
    .player-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }
    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .now-playing {
      max-width: 1600px;
      margin: 0 auto;
      padding: 10px 24px 0;
      font-size: 0.9rem;
      color: #aaa;
      min-height: 1.4em;
    }
    .athletes {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px 24px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }
    .athlete-row {
      background: #16213e;
      border-radius: 8px;
      padding: 14px 18px;
    }
    .athlete-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }
    .athlete-name .country {
      font-weight: 400;
      color: #888;
      font-size: 0.85rem;
      margin-left: 6px;
    }
    .climbs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .climb-btn {
      background: #0f3460;
      border: 1px solid #1a4a7a;
      color: #e0e0e0;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    .climb-btn:hover {
      background: #1a5a9a;
      border-color: #2a7acc;
    }
    .climb-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    @media (max-width: 720px) {
      .topbar { padding: 12px 16px 8px; }
      .player-container { padding: 0; }
      .player-inner { width: 100%; }
      .now-playing, .athletes { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>World Climbing Viewer</h1>
    <div class="event-picker">
      <label for="event-select">Event</label>
      <select id="event-select"></select>
    </div>
  </div>
  <div class="player-container">
    <div class="player-inner">
      <div class="player-frame">
        <div id="player"></div>
      </div>
    </div>
  </div>
  <div class="now-playing" id="now-playing"></div>
  <div class="athletes" id="athletes"></div>

  <script>
    let events = [];
    let player = null;
    let playerReady = false;
    let ytApiReady = false;
    let pendingVideoId = null;
    let segmentsData;
    let currentSlug;
    let activeBtn = null;

    function prefixFor(slug) {
      return slug.startsWith('mens-') ? 'M' : 'W';
    }

    async function loadEventIndex() {
      const resp = await fetch('events/index.json');
      const data = await resp.json();
      events = data.events.slice().sort((a, b) => {
        if (a.upload_date !== b.upload_date) {
          return a.upload_date < b.upload_date ? 1 : -1; // newest first
        }
        return a.title.localeCompare(b.title);
      });
    }

    function populateEventPicker() {
      const sel = document.getElementById('event-select');
      for (const ev of events) {
        const opt = document.createElement('option');
        opt.value = ev.slug;
        opt.textContent = ev.title;
        sel.appendChild(opt);
      }

      const initial = new URLSearchParams(location.search).get('event');
      const chosen = events.find(e => e.slug === initial) ? initial : events[0].slug;
      sel.value = chosen;
      sel.addEventListener('change', () => loadEvent(sel.value));
      return chosen;
    }

    async function loadEvent(slug) {
      currentSlug = slug;
      const url = new URL(location.href);
      url.searchParams.set('event', slug);
      history.replaceState(null, '', url);

      const resp = await fetch(`events/${slug}/segments.json`);
      segmentsData = await resp.json();

      document.getElementById('now-playing').textContent = '';
      activeBtn = null;

      syncPlayer();
      renderAthletes();
    }

    function loadYouTubeApi() {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }

    function syncPlayer() {
      if (!ytApiReady || !segmentsData) return;
      if (!player) {
        player = new YT.Player('player', {
          videoId: segmentsData.video_id,
          playerVars: { rel: 0, modestbranding: 1 },
          events: {
            onReady: () => {
              playerReady = true;
              if (pendingVideoId) {
                player.cueVideoById(pendingVideoId);
                pendingVideoId = null;
              }
            },
          },
        });
        return;
      }
      if (playerReady) {
        player.cueVideoById(segmentsData.video_id);
      } else {
        pendingVideoId = segmentsData.video_id;
      }
    }

    window.onYouTubeIframeAPIReady = function () {
      ytApiReady = true;
      syncPlayer();
    };

    function renderAthletes() {
      const container = document.getElementById('athletes');
      container.innerHTML = '';
      const athletes = segmentsData.athletes;
      const segments = segmentsData.segments;
      const prefix = prefixFor(currentSlug);

      const athleteClimbs = athletes.map(() => []);
      for (const seg of segments) {
        for (const idx of seg.athletes) {
          athleteClimbs[idx].push(seg);
        }
      }

      for (let i = 0; i < athletes.length; i++) {
        const athlete = athletes[i];
        const climbs = athleteClimbs[i];

        const row = document.createElement('div');
        row.className = 'athlete-row';

        const nameEl = document.createElement('div');
        nameEl.className = 'athlete-name';
        nameEl.textContent = athlete.name;
        if (athlete.country) {
          const countryEl = document.createElement('span');
          countryEl.className = 'country';
          countryEl.textContent = athlete.country;
          nameEl.appendChild(countryEl);
        }
        row.appendChild(nameEl);

        const climbsEl = document.createElement('div');
        climbsEl.className = 'climbs';

        for (let c = 0; c < climbs.length; c++) {
          const seg = climbs[c];
          const btn = document.createElement('button');
          btn.className = 'climb-btn';
          btn.textContent = `${prefix}${c + 1}`;
          btn.addEventListener('click', () => seekTo(seg.start, btn, athlete.name, c + 1, prefix));
          climbsEl.appendChild(btn);
        }

        row.appendChild(climbsEl);
        container.appendChild(row);
      }
    }

    function seekTo(time, btn, name, climbNum, prefix) {
      if (player && player.seekTo) {
        player.seekTo(time, true);
        player.playVideo();
      }
      if (activeBtn) activeBtn.classList.remove('active');
      btn.classList.add('active');
      activeBtn = btn;
      document.getElementById('now-playing').textContent = `Now playing: ${name} — ${prefix}${climbNum}`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadYouTubeApi();
    loadEventIndex().then(() => {
      const initialSlug = populateEventPicker();
      loadEvent(initialSlug);
    });
  </script>
</body>
</html>
